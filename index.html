<title>Stride — Personal Fitness Coach</title>
<style>
  html,body{margin:0;padding:0;background:#F4F0E8;}
  #root{min-height:100vh;}
  .boot{font-family:system-ui,-apple-system,sans-serif;color:#736C62;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;font-weight:600;padding:24px;text-align:center;}
  .boot .s{width:34px;height:34px;border:3px solid #EAE3D7;border-top-color:#F4533A;border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .boot .stage{font-size:13px;color:#A39B8E;font-weight:600;}
  .boot .err{max-width:340px;font-size:13px;color:#B5331F;line-height:1.5;}
  .boot button{font:600 14px system-ui;padding:10px 18px;border:none;border-radius:12px;background:#F4533A;color:#fff;}
  .boot h1{font-family:system-ui,-apple-system,sans-serif;font-size:32px;color:#F4533A;margin:0;font-weight:800;letter-spacing:-.02em;}
</style>
</head>
<body>
<div id="root">
  <div class="boot" id="boot">
    <h1>Stride 🏃</h1>
    <div class="s"></div>
    <div>Setting things up…</div>
    <div class="stage" id="bootStage">Starting</div>
  </div>
</div>

<script>
  (function(){
    var stage=document.getElementById("bootStage");
    function setStage(t){ if(stage) stage.textContent=t; }
    function showError(msg){
      var boot=document.getElementById("boot");
      if(boot){ boot.innerHTML = '<h1>Stride</h1><div class="err">'+msg+'</div><button onclick="location.reload()">Reload</button>'; }
    }
    function loadScript(src, label){
      return new Promise(function(resolve, reject){
        setStage("Loading "+label+"…");
        var s=document.createElement("script");
        s.src=src; s.crossOrigin="anonymous";
        s.onload=resolve;
        s.onerror=function(){ reject(new Error(label)); };
        document.head.appendChild(s);
      });
    }
    loadScript("https://unpkg.com/react@18.2.0/umd/react.production.min.js","React")
    .then(function(){ return loadScript("https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js","React DOM"); })
    .then(function(){
      setStage("Starting the app…");
      try { window.__startApp(); }
      catch(err){ showError("The app failed to start: "+(err && err.message ? err.message : err)); }
    })
    .catch(function(err){
      showError("Still downloading the app for the first time. Stay on Wi-Fi and give it a moment — once it loads it is saved to your phone and opens instantly after that, even offline. If it has been more than a minute, pull down to refresh.");
    });
  })();
</script>

/* ============================== WORKOUT GENERATOR ============================== */
// Filter exercises by user's available equipment, then build a weekly split.
function isAllowedEquip(equipSet, hasGym, exEquip) {
    if (hasGym)
        return true;
    return exEquip.some((eq) => {
        if (eq === "bodyweight")
            return equipSet.has("No Equipment") || equipSet.has("Bodyweight Only") || equipSet.has("Bands") || equipSet.size === 0;
        if (eq === "dumbbell")
            return equipSet.has("Dumbbells");
        if (eq === "bands")
            return equipSet.has("Bands");
        if (eq === "machine" || eq === "cable" || eq === "gym")
            return equipSet.has("Machines");
        return false;
    });
}
// Allowed exercises for this profile across ALL groups (used as the deep fallback pool)
function allAllowedExercises(profile, equipment) {
    const equipSet = new Set(equipment || profile.equipment || []);
    const hasGym = equipSet.has("Full Gym");
    return EXERCISES.filter((ex) => isAllowedEquip(equipSet, hasGym, ex.equip));
}
function exercisesFor(profile, group, count, equipment) {
    const equipSet = new Set(equipment || profile.equipment || []);
    const hasGym = equipSet.has("Full Gym");
    // First pass: target group + allowed equipment + beginner filter if applicable
    let pool = EXERCISES.filter((ex) => ex.group === group && isAllowedEquip(equipSet, hasGym, ex.equip));
    if (profile.level === "Beginner") {
        const begPool = pool.filter((e) => e.level === "beginner");
        if (begPool.length)
            pool = begPool;
    }
    return pool.slice(0, count);
}
// Returns the effective equipment list for a given training-day index (0-based: Mon=0, Tue=1...).
// When split-locations is on and the day is marked as a home day, returns homeEquipment.
// Otherwise returns the main `profile.equipment`. Backward-compatible: profiles without
// splitLocations always get profile.equipment.
function equipmentForDay(profile, dayIndex) {
    if (!profile.splitLocations)
        return profile.equipment || [];
    const homeDays = profile.homeDayIndices || [];
    if (homeDays.includes(dayIndex)) {
        const he = profile.homeEquipment || [];
        return he.length ? he : (profile.equipment || []);
    }
    return profile.equipment || [];
}
// Each "split type" returns an array of day templates. The generator then picks N of them based on days/week.
function buildSplits(profile) {
    const goals = new Set(profile.goals || []);
    const wantsMuscle = goals.has("Build Muscle") || goals.has("Tone Up");
    const wantsFatLoss = goals.has("Lose Weight") || goals.has("Tone Up");
    const wantsCardioFocus = goals.has("Improve Fitness");
    const days = parseInt(profile.daysPerWeek || "4", 10);
    // === SPLIT TEMPLATES (each yields {focus, groups[], cardio: bool|min, gradient}) ===
    // We construct an ordered set of training "days" of N entries based on goal + days available.
    const templates = {
        fullbody: { focus: "Full Body", groups: ["quads", "chest", "back", "core"], cardio: true, gradient: "linear-gradient(135deg,#F4533A,#D98A21)" },
        fullbody2: { focus: "Full Body (variation)", groups: ["hamstrings", "shoulders", "back", "core"], cardio: true, gradient: "linear-gradient(135deg,#1E7A66,#2E72C4)" },
        upper: { focus: "Upper Body", groups: ["chest", "back", "shoulders", "biceps", "triceps"], cardio: false, gradient: "linear-gradient(135deg,#2E72C4,#6A56C9)" },
        lower: { focus: "Lower Body", groups: ["quads", "hamstrings", "glutes", "calves"], cardio: false, gradient: "linear-gradient(135deg,#F4533A,#D98A21)" },
        push: { focus: "Push (Chest · Shoulders · Tris)", groups: ["chest", "shoulders", "triceps"], cardio: false, gradient: "linear-gradient(135deg,#2E72C4,#6A56C9)" },
        pull: { focus: "Pull (Back · Biceps)", groups: ["back", "back", "biceps"], cardio: false, gradient: "linear-gradient(135deg,#6A56C9,#F4533A)" },
        legs: { focus: "Legs · Glutes", groups: ["quads", "hamstrings", "glutes", "calves"], cardio: false, gradient: "linear-gradient(135deg,#F4533A,#D98A21)" },
        cardioStrength: { focus: "Cardio + Strength Circuit", groups: ["quads", "chest", "back"], cardio: true, gradient: "linear-gradient(135deg,#1E7A66,#D98A21)" },
        glutes: { focus: "Glutes & Lower", groups: ["glutes", "hamstrings", "quads"], cardio: true, gradient: "linear-gradient(135deg,#1E7A66,#2E72C4)" },
    };
    // Choose week structure based on PRIMARY goal + days/week
    // If multiple goals selected, pick the dominant one for structure
    const primary = (() => {
        if (goals.has("Build Muscle") && !goals.has("Lose Weight"))
            return "muscle";
        if (goals.has("Lose Weight") && !goals.has("Build Muscle"))
            return "loss";
        if (goals.has("Build Muscle") && goals.has("Lose Weight"))
            return "recomp";
        if (goals.has("Tone Up"))
            return "tone";
        if (goals.has("Improve Fitness"))
            return "fitness";
        return "general";
    })();
    let week = [];
    if (primary === "muscle") {
        // Hypertrophy splits — more sets, longer rest implied through reps
        if (days <= 3)
            week = [templates.fullbody, templates.upper, templates.lower];
        else if (days === 4)
            week = [templates.upper, templates.lower, templates.push, templates.legs];
        else if (days === 5)
            week = [templates.push, templates.pull, templates.legs, templates.upper, templates.lower];
        else
            week = [templates.push, templates.pull, templates.legs, templates.push, templates.pull, templates.legs];
    }
    else if (primary === "loss") {
        // Cardio-heavy with strength circuits
        if (days <= 3)
            week = [templates.fullbody, templates.cardioStrength, templates.fullbody2];
        else if (days === 4)
            week = [templates.fullbody, templates.cardioStrength, templates.lower, templates.upper];
        else if (days === 5)
            week = [templates.fullbody, templates.cardioStrength, templates.lower, templates.upper, templates.cardioStrength];
        else
            week = [templates.fullbody, templates.cardioStrength, templates.lower, templates.upper, templates.cardioStrength, templates.fullbody2];
    }
    else if (primary === "recomp" || primary === "tone") {
        // Balanced — strength forward, moderate cardio
        if (days <= 3)
            week = [templates.fullbody, templates.lower, templates.upper];
        else if (days === 4)
            week = [templates.lower, templates.upper, templates.glutes, templates.cardioStrength];
        else if (days === 5)
            week = [templates.lower, templates.upper, templates.glutes, templates.pull, templates.cardioStrength];
        else
            week = [templates.lower, templates.upper, templates.glutes, templates.pull, templates.cardioStrength, templates.fullbody];
    }

  width: 100%;
  text-align: left;
  padding: 14px;
  border-radius: 12px;
  border: 1.5px solid var(--line);
  background: var(--surface);
  cursor: pointer;
  font-family: 'Hanken Grotesk', sans-serif;
  margin-bottom: 4px;
}
.st-recovery-opt:active { background: var(--surface2); }
.st-recovery-opt.danger { border-color: var(--coral-soft); }
.st-recovery-opt.danger:hover { border-color: var(--coral); }
.st-recovery-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.st-recovery-name { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 14.5px; color: var(--ink); flex: 1; }
.st-recovery-badge { font-size: 9.5px; font-weight: 800; padding: 2px 7px; border-radius: 6px; letter-spacing: .05em; text-transform: uppercase; }
.st-recovery-badge.teal { background: var(--teal-soft); color: var(--teal); }
.st-recovery-detail { font-size: 12.5px; color: var(--ink2); font-weight: 600; line-height: 1.45; margin-bottom: 6px; }
.st-recovery-preview { font-size: 11.5px; color: var(--ink3); font-weight: 600; line-height: 1.55; font-family: ui-monospace, SFMono-Regular, monospace; }

/* === Toggle row (used in Profile for carry-forward) === */
.st-toggle-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  cursor: pointer;
}
.st-toggle-row:active { background: var(--surface2); }
.st-toggle-label { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 14.5px; color: var(--ink); }
.st-toggle-sub { font-size: 12.5px; color: var(--ink2); font-weight: 600; margin-top: 4px; line-height: 1.45; }
.st-toggle {
  flex-shrink: 0;
  width: 48px;
  height: 28px;
  background: var(--line);
  border-radius: 14px;
  position: relative;
  transition: background .2s;
}
.st-toggle.on { background: var(--teal); }
.st-toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 24px;
  height: 24px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 4px rgba(0,0,0,.15);
  transition: transform .2s;
}
.st-toggle.on .st-toggle-thumb { transform: translateX(20px); }

/* === Allergen / food-exclusion picker === */
.st-allergen-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 8px;
}
.st-allergen-pill {
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: 12px;
  padding: 10px 8px;
  cursor: pointer;
  text-align: center;
  font-family: 'Hanken Grotesk', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: border-color .12s, background .12s;
}
.st-allergen-pill:active { transform: scale(.985); }
.st-allergen-pill.active {
  background: var(--coral-soft);
  border-color: var(--coral);
}
.st-allergen-pill .emoji { font-size: 20px; line-height: 1; }
.st-allergen-pill .label { font-size: 11.5px; font-weight: 700; color: var(--ink2); }
.st-allergen-pill.active .label { color: var(--coral-ink); }

/* === Day picker for per-day equipment === */
.st-daypicker {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
}
.st-day-pill {
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: 12px;
  padding: 10px 6px;
  cursor: pointer;
  text-align: center;
  font-family: 'Hanken Grotesk', sans-serif;
  transition: border-color .12s, background .12s;
}
.st-day-pill:active { transform: scale(.985); }
.st-day-pill.gym { border-color: var(--line); }
.st-day-pill.home { border-color: var(--teal); background: var(--teal-soft); }
.st-day-pill .dow {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 14px;
  color: var(--ink);
}
.st-day-pill .loc {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink2);
  margin-top: 3px;
}
.st-day-pill.home .loc { color: var(--teal); }
.st-day-pill.cardio { border-color: var(--blue); background: var(--blue-soft); }
.st-day-pill.cardio .loc { color: var(--blue); }

/* === Cardio activity selector row (one row per cardio day) === */
.st-cardio-activity-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 8px 12px;
}
.st-cardio-activity-row .dow-label {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 14px;
  color: var(--ink);
  min-width: 36px;
}
.st-cardio-activity-row .st-select {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 10px;
  font-family: 'Hanken Grotesk', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
}

/* === Weight tracking === */
.st-weighin-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
}
.st-weighin-edit,
.st-weighin-del {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  color: var(--ink3);
  flex-shrink: 0;
}
.st-weighin-edit:active,
.st-weighin-del:active {
  background: var(--surface2);
}
.st-weighin-del:hover { color: var(--coral); }
.st-field-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* === Nutrition preferences (3-tier) === */
.st-pref-sec {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 10px;
}
.st-pref-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
}
.st-pref-head:active { background: var(--surface2); }
.st-pref-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 15px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.st-pref-count {
  font-size: 11px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 8px;
  letter-spacing: .02em;
}
.st-pref-sub {
  font-size: 12px;
  color: var(--ink2);
  font-weight: 600;
  margin-top: 3px;
  line-height: 1.4;
}
.st-pref-body {
  padding: 4px 16px 16px;
  border-top: 1px dashed var(--line);
}
.st-pref-cat {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-top: 12px;
  margin-bottom: 8px;
}
.st-food-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 7px;
}
.st-food-pill {
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: 11px;
  padding: 9px 6px;
  cursor: pointer;
  text-align: center;
  font-family: 'Hanken Grotesk', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: border-color .12s, background .12s;
}
.st-food-pill:active { transform: scale(.985); }
.st-food-pill.active {
  background: #FBF8F3;
  border-color: var(--ink);
}
.st-food-pill .emoji { font-size: 18px; line-height: 1; }
.st-food-pill .label { font-size: 11px; font-weight: 700; color: var(--ink2); line-height: 1.15; }
.st-food-pill.active .label { color: var(--ink); }

/* === Consistency score card === */
.st-consistency {
  background: linear-gradient(135deg, #1C1A17 0%, #34302a 100%);
  color: #fff;
  border-radius: 18px;
  padding: 18px;
  box-shadow: var(--shadow-lg);
}
.st-consistency-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.st-consistency-tag { font-size: 11px; font-weight: 700; letter-spacing: .1em; opacity: .75; }
.st-consistency-pct { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 44px; line-height: 1; margin-top: 4px; }
.st-consistency-pct span { font-size: 22px; opacity: .7; }
.st-consistency-ring { flex-shrink: 0; }
.st-consistency-stats { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; font-weight: 600; opacity: .9; flex-wrap: wrap; }
.st-consistency-stats .num { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; }
.st-consistency-stats .dot { opacity: .5; }
.st-consistency-blurb { font-size: 12.5px; font-weight: 600; opacity: .8; margin-top: 10px; line-height: 1.5; }

.st-root {
  --paper:#F4F0E8; --surface:#FFFFFF; --surface2:#FBF8F3;
  --ink:#1C1A17; --ink2:#736C62; --ink3:#A39B8E;
  --line:#EAE3D7; --line2:#F2ECE2;
  --coral:#F4533A; --coral-soft:#FDE6E0; --coral-ink:#B5331F;
  --teal:#1E7A66; --teal-soft:#DCEFE8;
  --gold:#D98A21; --gold-soft:#FBEBD2;
  --violet:#6A56C9; --violet-soft:#E8E3F8;
  --blue:#2E72C4; --blue-soft:#DDEAF8;
  --shadow:0 1px 2px rgba(28,26,23,.04), 0 8px 24px rgba(28,26,23,.06);
  --shadow-lg:0 4px 12px rgba(28,26,23,.08), 0 16px 48px rgba(28,26,23,.10);
  font-family:'Hanken Grotesk', system-ui, sans-serif;
  color:var(--ink); background:var(--paper); min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.st-display { font-family:'Bricolage Grotesque', sans-serif; font-weight:800; letter-spacing:-.02em; }

.st-shell { max-width:480px; margin:0 auto; padding:0 0 110px; position:relative; }

/* === ONBOARDING === */
.st-onb { min-height:100vh; padding:20px 20px 40px; max-width:480px; margin:0 auto; display:flex; flex-direction:column; }
.st-progress { display:flex; gap:6px; margin:8px 0 24px; }
.st-progress .dot { flex:1; height:5px; border-radius:3px; background:var(--line); transition:background .3s; }
.st-progress .dot.active { background:var(--coral); }
.st-progress .dot.done { background:var(--teal); }
.st-step { animation:stfade .4s ease; flex:1; }
@keyframes stfade { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
.st-step h1 { font-family:'Bricolage Grotesque'; font-size:28px; margin:8px 0 6px; letter-spacing:-.02em; line-height:1.15; }
.st-step .sub { font-size:14px; color:var(--ink2); margin:0 0 22px; line-height:1.5; font-weight:500; }
.st-step h2 { font-family:'Bricolage Grotesque'; font-size:17px; margin:22px 0 10px; letter-spacing:-.01em; }
.st-step h2:first-of-type { margin-top:0; }
.st-label { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink3); display:block; margin-bottom:6px; }
.st-input, .st-select { width:100%; border:1px solid var(--line); border-radius:12px; padding:12px 14px; font-size:15px; font-family:inherit; background:var(--surface2); color:var(--ink); font-weight:600; -webkit-appearance:none; appearance:none; }
.st-input:focus, .st-select:focus { outline:none; border-color:var(--coral); }
.st-select { background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%23A39B8E' stroke-width='2' stroke-linecap='round' d='M1 1l5 5 5-5'/></svg>"); background-repeat:no-repeat; background-position:right 14px center; padding-right:38px; }
.st-row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.st-row3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.st-helper { font-size:11px; color:var(--ink3); margin-top:4px; font-weight:600; }
.st-hint { font-size:12px; color:var(--ink2); background:var(--gold-soft); border-radius:10px; padding:8px 12px; margin-top:10px; line-height:1.4; font-weight:600; }

/* Tap tiles */
.st-tiles { display:grid; gap:10px; margin-top:8px; }
.st-tiles.cols2 { grid-template-columns:1fr 1fr; }
.st-tiles.cols3 { grid-template-columns:repeat(3,1fr); }
.st-tile { background:var(--surface); border:1.5px solid var(--line); border-radius:14px; padding:12px 8px; cursor:pointer; text-align:center; transition:all .12s; position:relative; min-height:78px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.st-tile:active { transform:scale(.97); }
.st-tile.sel { border-color:var(--coral); background:var(--coral-soft); }
.st-tile.sel::after { content:'✓'; position:absolute; top:5px; right:8px; width:18px; height:18px; border-radius:50%; background:var(--coral); color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; line-height:1; }
.st-tile .em { font-size:22px; line-height:1; }
.st-tile .lab { font-size:13px; font-weight:700; line-height:1.15; margin-top:4px; }
.st-tile .desc { font-size:10.5px; color:var(--ink3); line-height:1.25; margin-top:2px; font-weight:600; }
.st-tile.sel .desc { color:var(--coral-ink); }

.st-nav { display:flex; gap:10px; margin-top:30px; }
.st-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:15px; border-radius:14px; border:none; font-size:15px; font-weight:800; font-family:'Bricolage Grotesque'; cursor:pointer; transition:transform .08s; }
.st-btn:active { transform:scale(.985); }
.st-btn-primary { background:var(--coral); color:#fff; box-shadow:0 6px 16px rgba(244,83,58,.32); }
.st-btn-ghost { background:var(--surface); color:var(--ink); border:1.5px solid var(--line); flex:0 0 auto; padding:15px 18px; }
.st-btn-dark { background:var(--ink); color:#fff; }

/* === DASHBOARD === */
.st-top { padding:22px 20px 10px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.st-top h1 { font-size:13px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink2); margin:0 0 4px; }
.st-top .big { font-size:27px; line-height:1.05; margin:0; }
.st-avatar { width:46px; height:46px; border-radius:14px; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-family:'Bricolage Grotesque'; flex-shrink:0; box-shadow:var(--shadow); }

.st-card { background:var(--surface); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); }
.st-pad { padding:18px; }
.st-sec { margin:14px 20px; }
.st-sec-h { display:flex; align-items:center; gap:9px; margin:0 0 11px; }
.st-sec-h .ico { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.st-sec-h h2 { font-size:16px; margin:0; font-weight:700; font-family:'Bricolage Grotesque'; letter-spacing:-.01em; }
.st-sec-h .sub { font-size:12px; color:var(--ink3); margin-left:auto; font-weight:600; }

.st-hero { margin:6px 20px 16px; border-radius:22px; padding:20px; color:#fff; position:relative; overflow:hidden; box-shadow:var(--shadow-lg); }
.st-hero::after { content:''; position:absolute; right:-40px; top:-40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.10); }
.st-hero .tag { font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; opacity:.85; }
.st-hero .ttl { font-size:26px; margin:3px 0 2px; position:relative; }
.st-hero .meta { font-size:13px; opacity:.9; display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; position:relative; }
.st-hero .meta span { display:inline-flex; align-items:center; gap:5px; }

.st-ex { border:1px solid var(--line); border-radius:16px; margin-bottom:10px; background:var(--surface); overflow:hidden; }
.st-ex.done { background:var(--surface2); border-color:var(--line2); }
.st-ex-top { display:flex; align-items:center; gap:12px; padding:13px 14px; cursor:pointer; }
.st-check { width:26px; height:26px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; background:none; padding:0; }
.st-ex-name { font-weight:700; font-size:15px; line-height:1.2; }
.st-ex.done .st-ex-name { color:var(--ink2); text-decoration:line-through; text-decoration-color:var(--ink3); }
.st-ex-muscle { font-size:11.5px; color:var(--ink3); font-weight:600; margin-top:1px; }
.st-ex-rx { text-align:right; flex-shrink:0; }
.st-ex-rx .sr { font-weight:800; font-size:15px; font-family:'Bricolage Grotesque'; white-space:nowrap; }
.st-ex-rx .wt { font-size:11.5px; color:var(--coral); font-weight:700; }
.st-chev { color:var(--ink3); flex-shrink:0; transition:transform .2s; }
.st-chev.open { transform:rotate(180deg); }
.st-ex-body { padding:0 14px 14px; border-top:1px dashed var(--line); margin-top:-1px; }
.st-ex-body.collapsed { display:none; }
.st-detail-row { font-size:13px; color:var(--ink2); line-height:1.5; margin:11px 0 0; }
.st-detail-row b { color:var(--ink); font-weight:700; }

/* Nutrition tab */
.st-nut-cal { background:linear-gradient(135deg,#1C1A17,#34302a); color:#fff; border-radius:22px; padding:22px; margin:0 20px 16px; box-shadow:var(--shadow-lg); position:relative; overflow:hidden; }
.st-nut-cal::after { content:''; position:absolute; right:-30px; top:-30px; width:140px; height:140px; border-radius:50%; background:rgba(244,83,58,.18); }
.st-nut-cal .lbl { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; opacity:.7; }
.st-nut-cal .big { font-family:'Bricolage Grotesque'; font-size:54px; line-height:1; margin-top:6px; font-weight:800; letter-spacing:-.02em; }
.st-nut-cal .big small { font-size:18px; opacity:.7; font-weight:700; margin-left:6px; }
.st-nut-cal .strat { font-size:13px; opacity:.85; margin-top:14px; line-height:1.5; position:relative; }
.st-macros { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:0 20px 16px; }
.st-macro { background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; text-align:center; box-shadow:var(--shadow); }
.st-macro .num { font-family:'Bricolage Grotesque'; font-size:26px; line-height:1; font-weight:800; letter-spacing:-.02em; }
.st-macro .num small { font-size:13px; color:var(--ink3); font-weight:700; }
.st-macro .lbl { font-size:11px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.06em; margin-top:6px; }
.st-macro.prot .num { color:var(--coral); }
.st-macro.carbs .num { color:var(--gold); }
.st-macro.fat .num { color:var(--teal); }

.st-tip { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:13px 14px; display:flex; gap:10px; align-items:flex-start; margin-bottom:10px; }
.st-tip .ti { width:30px; height:30px; border-radius:9px; background:var(--gold-soft); color:var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.st-tip .tt { font-size:13px; line-height:1.5; color:var(--ink2); }
.st-tip .tt b { color:var(--ink); }

.st-nav-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,.88); backdrop-filter:blur(16px); border-top:1px solid var(--line); display:flex; padding:8px 4px calc(8px + env(safe-area-inset-bottom)); z-index:50; }
.st-nav-bar-inner { max-width:480px; margin:0 auto; display:flex; width:100%; }
.st-nav-bar button { flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 1px; color:var(--ink3); font-size:10.5px; font-weight:700; border-radius:12px; transition:color .15s; }
.st-nav-bar button.active { color:var(--coral); }

.st-toast { position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:13px 20px; border-radius:14px; font-weight:700; font-size:14px; z-index:100; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:9px; animation:stpop .25s; max-width:90%; }
@keyframes stpop { from{ opacity:0; transform:translate(-50%,12px);} to{opacity:1;transform:translate(-50%,0);} }

.st-disclaimer { font-size:11.5px; color:var(--ink3); padding:14px 24px; text-align:center; font-weight:600; line-height:1.45; }

    // planner can still pick it — but it'll always lose to a meal with liked foods.

    if (dislikes.length && meal.ingredients) {

        for (const ing of meal.ingredients) {
            const ingName = (ing.item || "").toLowerCase();
            for (const d of dislikes) {

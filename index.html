<title>Stride — Personal Fitness Coach</title>
<style>
  html,body{margin:0;padding:0;background:#F4F0E8;}
  #root{min-height:100vh;}
  .boot{font-family:system-ui,-apple-system,sans-serif;color:#736C62;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;font-weight:600;padding:24px;text-align:center;}
  .boot .s{width:34px;height:34px;border:3px solid #EAE3D7;border-top-color:#F4533A;border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .boot .stage{font-size:13px;color:#A39B8E;font-weight:600;}
  .boot .err{max-width:340px;font-size:13px;color:#B5331F;line-height:1.5;}
  .boot button{font:600 14px system-ui;padding:10px 18px;border:none;border-radius:12px;background:#F4533A;color:#fff;}
  .boot h1{font-family:system-ui,-apple-system,sans-serif;font-size:32px;color:#F4533A;margin:0;font-weight:800;letter-spacing:-.02em;}
</style>
</head>
<body>
<div id="root">
  <div class="boot" id="boot">
    <h1>Stride 🏃</h1>
    <div class="s"></div>
    <div>Setting things up…</div>
    <div class="stage" id="bootStage">Starting</div>
  </div>
</div>

<script>
  (function(){
    var stage=document.getElementById("bootStage");
    function setStage(t){ if(stage) stage.textContent=t; }
    function showError(msg){
      var boot=document.getElementById("boot");
      if(boot){ boot.innerHTML = '<h1>Stride</h1><div class="err">'+msg+'</div><button onclick="location.reload()">Reload</button>'; }
    }
    function loadScript(src, label){
      return new Promise(function(resolve, reject){
        setStage("Loading "+label+"…");
        var s=document.createElement("script");
        s.src=src; s.crossOrigin="anonymous";
        s.onload=resolve;
        s.onerror=function(){ reject(new Error(label)); };
        document.head.appendChild(s);
      });
    }
    loadScript("https://unpkg.com/react@18.2.0/umd/react.production.min.js","React")
    .then(function(){ return loadScript("https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js","React DOM"); })
    .then(function(){
      setStage("Starting the app…");
      try { window.__startApp(); }
      catch(err){ showError("The app failed to start: "+(err && err.message ? err.message : err)); }
    })
    .catch(function(err){
      showError("Still downloading the app for the first time. Stay on Wi-Fi and give it a moment — once it loads it is saved to your phone and opens instantly after that, even offline. If it has been more than a minute, pull down to refresh.");
    });
  })();
</script>

// Filter exercises by user's available equipment, then build a weekly split.
function isAllowedEquip(equipSet, hasGym, exEquip) {
    if (hasGym)
        return true;
    return exEquip.some((eq) => {
        if (eq === "bodyweight")
            return equipSet.has("No Equipment") || equipSet.has("Bodyweight Only") || equipSet.has("Bands") || equipSet.size === 0;
        if (eq === "dumbbell")
            return equipSet.has("Dumbbells");
        if (eq === "bands")
            return equipSet.has("Bands");
        if (eq === "machine" || eq === "cable" || eq === "gym")
            return equipSet.has("Machines");
        return false;
    });
}
// Allowed exercises for this profile across ALL groups (used as the deep fallback pool)
function allAllowedExercises(profile) {
    const equipSet = new Set(profile.equipment || []);
    const hasGym = equipSet.has("Full Gym");
    return EXERCISES.filter((ex) => isAllowedEquip(equipSet, hasGym, ex.equip));
}
function exercisesFor(profile, group, count) {
    const equipSet = new Set(profile.equipment || []);
    const hasGym = equipSet.has("Full Gym");
    // First pass: target group + allowed equipment + beginner filter if applicable
    let pool = EXERCISES.filter((ex) => ex.group === group && isAllowedEquip(equipSet, hasGym, ex.equip));
    if (profile.level === "Beginner") {
        const begPool = pool.filter((e) => e.level === "beginner");
        if (begPool.length)
            pool = begPool;
    }
    return pool.slice(0, count);
}
// Each "split type" returns an array of day templates. The generator then picks N of them based on days/week.
function buildSplits(profile) {

    const wantsCardioFocus = goals.has("Improve Fitness");

        pull: { focus: "Pull (Back · Biceps)", groups: ["back", "back", "biceps"], cardio: false, gradient: "linear-gradient(135deg,#6A56C9,#F4533A)" },
        legs: { focus: "Legs · Glutes", groups: ["quads", "hamstrings", "glutes", "calves"], cardio: false, gradient: "linear-gradient(135deg,#F4533A,#D98A21)" },
        cardioStrength: { focus: "Cardio + Strength Circuit", groups: ["quads", "chest", "back"], cardio: true, gradient: "linear-gradient(135deg,#1E7A66,#D98A21)" },
        glutes: { focus: "Glutes & Lower", groups: ["glutes", "hamstrings", "quads"], cardio: true, gradient: "linear-gradient(135deg,#1E7A66,#2E72C4)" },

    // Choose week structure based on PRIMARY goal + days/week

        if (goals.has("Build Muscle") && goals.has("Lose Weight"))

        else if (days === 5)

        else
            week = [templates.fullbody, templates.upper, templates.lower, templates.cardioStrength, templates.fullbody2, templates.cardioStrength];
    }

function generateProgram(profile) {
    if (!profile || !profile.daysPerWeek)
        return null;
    const { week, primary } = buildSplits(profile);
    const days = parseInt(profile.daysPerWeek || "4", 10);
    // Map weekday names: Mon, Tue, Wed... up to days. Always Mon-first.
    const dayNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    // Pick the user's cardio preference (or default to Walking)
    const cardioChoices = (profile.cardio || []).filter((c) => c !== "No Cardio");
    const noCardio = (profile.cardio || []).includes("No Cardio") || cardioChoices.length === 0;
    // Rotate through cardio choices across the week
    let cardioIdx = 0;
    const pickCardio = () => {
        if (noCardio)
            return null;
        const c = cardioChoices[cardioIdx % cardioChoices.length];
        cardioIdx++;
        return CARDIO_OPTIONS[c] || CARDIO_OPTIONS.Walking;
    };
    // Workout length affects exercise count + cardio duration
    const lenMin = parseInt(String(profile.workoutLength || "45").replace(/[^\d]/g, ""), 10) || 45;
    const exercisesPerDay = lenMin <= 20 ? 3 : lenMin <= 30 ? 4 : lenMin <= 45 ? 5 : 6;
    const cardioMin = primary === "loss" || primary === "fitness"
        ? Math.max(10, Math.min(25, Math.round(lenMin * 0.4)))
        : Math.max(8, Math.min(15, Math.round(lenMin * 0.25)));
    // Modify rep ranges by goal
    const repBias = primary === "muscle" ? 0 : primary === "loss" ? 4 : 2; // higher reps for loss
    const setBias = primary === "muscle" ? 1 : 0;
    const allAllowed = allAllowedExercises(profile);
    const program = week.slice(0, days).map((tpl, i) => {
        const groups = tpl.groups;
        const strength = [];
        // Pass 1: try the day's target groups in order, rotating
        for (let g = 0; g < groups.length && strength.length < exercisesPerDay; g++) {
            const candidates = exercisesFor(profile, groups[g], 6).filter((c) => !strength.find((s) => s.id === c.id));
            if (candidates.length) {
                strength.push(candidates[0]);
            }
        }
        // Pass 2: if still short, cycle through groups again (allowing 2nd/3rd picks within a group)
        let safety = 0;
        while (strength.length < exercisesPerDay && safety < 30) {
            const g = groups[safety % groups.length];
            const candidates = exercisesFor(profile, g, 6).filter((c) => !strength.find((s) => s.id === c.id));
            if (candidates.length)
                strength.push(candidates[0]);
            else
                break;
            safety++;
        }
        // Pass 3 — fallback: pull from ALL allowed exercises (any group) to make up the count
        let fbIdx = 0;
        while (strength.length < exercisesPerDay && fbIdx < allAllowed.length) {
            const ex = allAllowed[(fbIdx + i * 3) % allAllowed.length];
            if (!strength.find((s) => s.id === ex.id) && ex.group !== "core") {
                strength.push(ex);
            }
            fbIdx++;
        }
        // Apply rep/set bias to each exercise we picked
        const tunedStrength = strength.map((ex) => ({ ...ex, reps: ex.reps + repBias, sets: ex.sets + setBias }));
        const cardio = tpl.cardio && !noCardio ? (() => {
            const c = pickCardio();
            if (!c)
                return null;
            return { id: `c-${i}`, name: c.id, machine: c.machine, note: c.note, duration: cardioMin, alts: Object.keys(CARDIO_OPTIONS).filter((k) => k !== c.id).slice(0, 2) };
        })() : null;
        // Pick 4 warmups, 4 cooldowns deterministically by day index
        const wuStart = (i * 2) % WARMUP_POOL.length;
        const warmup = [
            WARMUP_POOL[wuStart],
            WARMUP_POOL[(wuStart + 1) % WARMUP_POOL.length],
            WARMUP_POOL[(wuStart + 2) % WARMUP_POOL.length],
            WARMUP_POOL[(wuStart + 3) % WARMUP_POOL.length],
        ];
        const cdStart = (i * 2) % COOLDOWN_POOL.length;
        const cooldown = [
            COOLDOWN_POOL[cdStart],
            COOLDOWN_POOL[(cdStart + 1) % COOLDOWN_POOL.length],
            COOLDOWN_POOL[(cdStart + 2) % COOLDOWN_POOL.length],
            COOLDOWN_POOL[(cdStart + 3) % COOLDOWN_POOL.length],
        ];
        // Core block — 2 moves
        const coreStart = i % EXERCISES.filter((e) => e.group === "core").length;
        const coreEx = EXERCISES.filter((e) => e.group === "core");
        const core = [coreEx[coreStart], coreEx[(coreStart + 1) % coreEx.length]].map((c) => ({
            id: c.id, name: c.name, detail: `${c.sets} × ${c.reps}${c.type === "core" && c.id === "pk" ? " sec" : ""}`,
        }));
        return {
            key: `d${i + 1}`,
            day: dayNames[i],
            focus: tpl.focus,
            gradient: tpl.gradient,
            warmup,
            strength: tunedStrength,
            cardio,
            core,
            cooldown,
        };
    });

}
/* ============================== NUTRITION CALCULATION ============================== */
function calculateNutrition(profile) {
    if (!profile || !profile.weightLbs || !profile.heightIn || !profile.age)
        return null;
    const weightKg = profile.weightLbs * 0.4536;
    const heightCm = profile.heightIn * 2.54;
    const age = profile.age;
    const female = profile.gender !== "Male";
    // Mifflin-St Jeor BMR
    let bmr = female
        ? (10 * weightKg) + (6.25 * heightCm) - (5 * age) - 161
        : (10 * weightKg) + (6.25 * heightCm) - (5 * age) + 5;
    const activityFactors = { Sedentary: 1.2, "Lightly Active": 1.375, "Moderately Active": 1.55, "Very Active": 1.725 };
    const tdee = bmr * (activityFactors[profile.activityLevel] || 1.375);
    // Goal-adjusted calories
    const goals = new Set(profile.goals || []);
    const nutGoals = new Set(profile.nutritionGoals || []);
    const wantsMuscle = goals.has("Build Muscle") || nutGoals.has("Muscle Gain");
    const wantsLoss = goals.has("Lose Weight") || nutGoals.has("Calorie Deficit");
    const maintenance = nutGoals.has("Maintenance");
    let calories, strategy;
    if (wantsLoss && wantsMuscle) {
        calories = tdee * 0.92;
        strategy = "recomposition — a small calorie deficit with high protein to preserve muscle while losing fat";
    }
    else if (wantsLoss) {
        calories = tdee * 0.82;
        strategy = "fat loss — a moderate calorie deficit of about 18% below maintenance for steady weight loss (~0.7–1 lb/week)";
    }
    else if (wantsMuscle) {
        calories = tdee + 250;
        strategy = "muscle gain — a small calorie surplus to support building lean tissue";
    }
    else if (maintenance) {
        calories = tdee;
        strategy = "maintenance — eating at your daily energy needs";
    }
    else {
        calories = tdee;
        strategy = "maintenance — eating at your daily energy needs";
    }
    // Minimum calorie floor
    const minCals = female ? 1200 : 1500;
    calories = Math.max(minCals, calories);
    calories = Math.round(calories / 50) * 50;
    // Macros
    const dietStyles = new Set(profile.dietStyles || []);
    const highProtein = dietStyles.has("High Protein") || wantsMuscle;
    const lowerCarb = dietStyles.has("Lower Carb");
    let proteinPct = 0.25, carbPct = 0.45, fatPct = 0.30;
    if (highProtein)
        proteinPct = 0.35;
    if (wantsLoss && proteinPct < 0.33)
        proteinPct = 0.33;
    if (lowerCarb)
        carbPct = 0.30;
    // Rebalance fat so percentages sum to 1
    fatPct = 1 - proteinPct - carbPct;
    if (fatPct < 0.20)
        fatPct = 0.20;
    // Re-normalize
    const sum = proteinPct + carbPct + fatPct;
    proteinPct /= sum;
    carbPct /= sum;
    fatPct /= sum;
    // Calories per gram: protein 4, carbs 4, fat 9
    const protein = Math.round((calories * proteinPct) / 4);
    const carbs = Math.round((calories * carbPct) / 4);
    const fat = Math.round((calories * fatPct) / 9);
    // Water target: weightLbs * 0.5 oz
    const water = Math.round(profile.weightLbs * 0.5);
    return {
        calories, protein, carbs, fat, water,
        tdee: Math.round(tdee), bmr: Math.round(bmr),
        strategy,
        deficit: wantsLoss ? Math.round(tdee - calories) : (wantsMuscle ? -250 : 0),
    };
}
